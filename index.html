            '1101': { code: 'S↑L↑E↓C↑', name: '浪漫卷王', nickname: '>.<嘤嘤嘤~', desc: '感觉你是那种不会点烤鸭拌饭的；一遍卷着书本，一边写三行情诗。绩点4.0，情书也是4.0。' },
            '1110': { code: 'S↑L↑E↑C↓', name: 'ZOMBIE', nickname: '丧尸', desc: '哪怕保院爆炸了，只要对象没回消息，就疯狂咬人。没有回音的山谷，你不仅纵身一跃，还开了民宿。当然，民宿里必须有好吃的。' },
            '1111': { code: 'S↑L↑E↑C↑', name: '杂交大学生', nickname: 'fucker', desc: '你做的事足以写进本校2026年保定大学招生简章的正反面案例。既是卷王，又是情种，还是干饭王，精神状态极其不稳定。' }
        };

        // -----------------------------------------------------------
        // 2️⃣ 全局变量与状态管理 (保持不变)
        // -----------------------------------------------------------
        let currentIndex = 0;
        let answers = new Array(QUESTIONS.length).fill(null);
        let forcedPersonality = null;
        
        const testSection = document.getElementById('testSection');
        const resultSection = document.getElementById('resultSection');
        const questionDisplay = document.getElementById('questionDisplay');
    
        const optionsDiv = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressFill = document.getElementById('progressFill');
        const currentQSpan = document.getElementById('currentQNumber');
        const totalQSpan = document.getElementById('totalQNumber');
        const resultCode = document.getElementById('resultCode');
        const resultNickname = document.getElementById('resultNickname');
        const resultName = document.getElementById('resultName');
        const resultDesc = document.getElementById('resultDesc');
        const dimensionBars = document.getElementById('dimensionBars');
        const restartFromResult = document.getElementById('restartFromResult');

        totalQSpan.textContent = `/ ${QUESTIONS.length}`;

        // -----------------------------------------------------------
        // 3️⃣ 渲染当前题目 (保持不变)
        // -----------------------------------------------------------
        function renderQuestion() {
            const q = QUESTIONS[currentIndex];
            questionDisplay.textContent = q.text;
            optionsDiv.innerHTML = '';
            OPTION_TEXTS.forEach((optText, optIdx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = optText;
                if (answers[currentIndex] === optIdx) btn.classList.add('selected');
                btn.addEventListener('click', () => {
                    answers[currentIndex] = optIdx;
                    const q = QUESTIONS[currentIndex];
                    if (q.force && q.force.optionIndex === optIdx) forcedPersonality = q.force.result;
                    renderQuestion();
                    nextBtn.disabled = false;
                });
                optionsDiv.appendChild(btn);
            });
            const progressPercent = ((currentIndex + 1) / QUESTIONS.length) * 100;
            progressFill.style.width = progressPercent + '%';
            currentQSpan.textContent = currentIndex + 1;
            prevBtn.disabled = (currentIndex === 0);
            nextBtn.disabled = (answers[currentIndex] === null);
            nextBtn.textContent = (currentIndex === QUESTIONS.length - 1) ? '查看成分 ✨' : '下一题 →';
        }

        // -----------------------------------------------------------
        // 4️⃣ 计分逻辑 (保持不变)
        // -----------------------------------------------------------
        function calculateScores() {
            const dimScores = [0, 0, 0, 0];
            const dimCounts = [0, 0, 0, 0];
            for (let i = 0; i < QUESTIONS.length; i++) {
                const ans = answers[i];
                if (ans === null) continue;
                const dim = QUESTIONS[i].dimension;
                dimScores[dim] += (ans + 1);
                dimCounts[dim]++;
            }
            return dimScores.map((sum, idx) => {
                const max = dimCounts[idx] * 5;
                return max > 0 ? Math.round((sum / max) * 100) : 50;
            });
        }

        function getTypeFromScores(scores) {
            const bits = scores.map(s => s >= 50 ? 1 : 0).join('');
            return PERSONALITY_MATRIX[bits] || PERSONALITY_MATRIX['0000'];
        }

        function renderDimensions(scores) {
            let html = '';
            for (let i = 0; i < 4; i++) {
                const dim = DIMENSIONS[i];
                const score = scores[i];
                const fillWidth = score + '%';
                html += `<div class="dim-item">
                    <span class="dim-label">${dim.name}</span>
                    <div class="dim-bar-container">
                        <span style="font-size:0.8rem; opacity:0.8;">${dim.low}</span>
                        <div class="dim-bar"><div class="dim-fill" style="width: ${fillWidth}; background: #a28b74;"></div></div>
                        <span style="font-size:0.8rem; opacity:0.8;">${dim.high}</span>
                    </div>
                    <span style="min-width:40px; font-size:0.9rem;">${score}</span>
                </div>`;
            }
            dimensionBars.innerHTML = html;
        }

        function showResult() {
            let personality, scores;
            if (forcedPersonality) {
                personality = forcedPersonality;
            } else {
                scores = calculateScores();
                personality = getTypeFromScores(scores);
            }
            if (forcedPersonality) {
                dimensionBars.innerHTML = '<p style="text-align:center; padding:20px; color:#8d7a66;">✨ 命运已定 ✨</p>';
            } else {
                renderDimensions(scores);
            }
            resultCode.textContent = personality.code;
            resultNickname.textContent = personality.nickname;
            resultName.textContent = personality.name;
            resultDesc.textContent = personality.desc;
            testSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
        }

        function resetTest() {
            forcedPersonality = null;
            currentIndex = 0;
            answers = new Array(QUESTIONS.length).fill(null);
            testSection.classList.remove('hidden');
            resultSection.classList.add('hidden');
            renderQuestion();
        }

        // -----------------------------------------------------------
        // 5️⃣ 事件绑定 (保持不变)
        // -----------------------------------------------------------
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) { currentIndex--; renderQuestion(); }
        });
        nextBtn.addEventListener('click', () => {
            if (answers[currentIndex] === null) return;
            if (currentIndex === QUESTIONS.length - 1) showResult();
            else { currentIndex++; renderQuestion(); }
        });
        restartFromResult.addEventListener('click', resetTest);

        renderQuestion();
    })();
</script>
</body>
</html>
